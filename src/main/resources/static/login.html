<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEase — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
    <a href="/index.html" class="nav-brand">Stay<span>Ease</span></a>
    <div class="nav-links">
        <span id="nav-email"></span>
        <a href="/index.html">Rooms</a>
        <a href="/dashboard.html" id="nav-dashboard" style="display:none">My Bookings</a>
        <a href="/admin.html" id="nav-admin" style="display:none">Admin</a>
        <a href="/login.html" id="nav-login">Login</a>
        <a href="/login.html?mode=register" id="nav-register" class="btn-accent">Register</a>
        <a href="#" id="nav-logout" style="display:none" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="form-card">
        <h2 id="form-title">Welcome back</h2>
        <div id="alert-box"></div>

        <div id="register-fields" style="display:none">
            <div class="form-group">
                <label>Full name</label>
                <input type="text" id="name" placeholder="Nour Hallal">
            </div>
        </div>

        <div class="form-group">
            <label>Email address</label>
            <input type="email" id="email" placeholder="you@email.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn btn-primary btn-full" onclick="handleSubmit()">
            <span id="btn-text">Login</span>
        </button>

        <p style="text-align:center; margin-top:1rem; font-size:0.9rem; color:var(--text-muted)">
            <span id="switch-text">Don't have an account?</span>
            <a href="#" onclick="toggleMode()" style="color:var(--primary-light); font-weight:600">
                <span id="switch-link">Register here</span>
            </a>
        </p>
    </div>
</div>

<footer>
    <p>© 2026 StayEase. All rights reserved.</p>
</footer>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
    let isRegisterMode = false;

    // Check URL for mode=register
    if (new URLSearchParams(window.location.search).get('mode') === 'register') {
        toggleMode();
    }

    function toggleMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('form-title').textContent = isRegisterMode ? 'Create account' : 'Welcome back';
        document.getElementById('btn-text').textContent = isRegisterMode ? 'Register' : 'Login';
        document.getElementById('register-fields').style.display = isRegisterMode ? 'block' : 'none';
        document.getElementById('switch-text').textContent = isRegisterMode ? 'Already have an account?' : "Don't have an account?";
        document.getElementById('switch-link').textContent = isRegisterMode ? 'Login here' : 'Register here';
    }

    function showAlert(message, type) {
        document.getElementById('alert-box').innerHTML =
            `<div class="alert alert-${type}">${message}</div>`;
    }

    async function handleSubmit() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
            showAlert('Please fill in all fields.', 'error');
            return;
        }

        try {
            let data;
            if (isRegisterMode) {
                const name = document.getElementById('name').value.trim();
                if (!name) { showAlert('Please enter your name.', 'error'); return; }
                data = await register(name, email, password);
            } else {
                data = await login(email, password);
            }

            if (data.token) {
                saveAuth(data);
                window.location.href = '/index.html';
            } else {
                showAlert(data.error || 'Something went wrong.', 'error');
            }
        } catch (err) {
            showAlert('Server error. Please try again.', 'error');
        }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleSubmit();
    });

    updateNavbar();

    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = '/index.html';
</script>

</body>
</html>
